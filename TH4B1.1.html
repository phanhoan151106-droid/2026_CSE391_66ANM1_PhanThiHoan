<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bảng điểm sinh viên</title>
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<input type="text" id="name" placeholder="Họ tên">
<input type="number" id="score" placeholder="Điểm">
<button onclick="addStudent()">Thêm</button>

<br><br>

<table border="1">
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<p id="stats"></p>

<script>

let students = [];

function classify(score){
    if(score >= 8.5) return "Giỏi";
    if(score >= 7) return "Khá";
    if(score >= 5) return "Trung bình";
    return "Yếu";
}

function addStudent(){

    let name = document.getElementById("name").value.trim();
    let score = Number(document.getElementById("score").value);

    if(name === "" || score < 0 || score > 10){
        alert("Dữ liệu không hợp lệ");
        return;
    }

    students.push({name, score});

    renderTable();

    document.getElementById("name").value = "";
    document.getElementById("score").value = "";
}

function renderTable(){

    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    let sum = 0;

    students.forEach((st,index)=>{

        sum += st.score;

        let tr = document.createElement("tr");

        if(st.score < 5){
            tr.style.background = "yellow";
        }

        tr.innerHTML = `
        <td>${index+1}</td>
        <td>${st.name}</td>
        <td>${st.score}</td>
        <td>${classify(st.score)}</td>
        <td><button onclick="deleteStudent(${index})">Xóa</button></td>
        `;

        tbody.appendChild(tr);

    });

    let avg = students.length ? (sum/students.length).toFixed(2) : 0;

    document.getElementById("stats").innerText =
    "Tổng SV: " + students.length + " | Điểm TB: " + avg;
}

function deleteStudent(index){

    students.splice(index,1);

    renderTable();
}

document.getElementById("score").addEventListener("keyup",function(e){

    if(e.key === "Enter"){
        addStudent();
    }

});

</script>

</body>
</html>
